# Pulsar Package Catalog
# Defines available packages for installation via the pulsar CLI

# Core Required Packages

[packages.wezterm]
description = "Terminal emulator (required)"
type = "binary"
category = "core"
required = true

[packages.wezterm.linux.x86_64]
url = "https://github.com/wez/wezterm/releases/download/nightly/WezTerm-nightly-Ubuntu20.04.AppImage"
archive_format = "appimage"
binary_path = "wezterm"
extract_appimage = true

[packages.wezterm.windows.x86_64]
url = "https://github.com/wez/wezterm/releases/download/nightly/WezTerm-windows-nightly.zip"
archive_format = "zip"
binary_path = "wezterm.exe"
search_binary = true
extract_all = true

[packages.neovim]
description = "Neovim text editor (required)"
type = "binary"
category = "core"
required = true

[packages.neovim.linux.x86_64]
url = "https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.appimage"
archive_format = "appimage"
binary_path = "nvim"
extract_appimage = true

[packages.neovim.linux.aarch64]
url = "https://github.com/neovim/neovim/releases/download/stable/nvim-linux-arm64.appimage"
archive_format = "appimage"
binary_path = "nvim"
extract_appimage = true

[packages.neovim.windows.x86_64]
url = "https://github.com/neovim/neovim/releases/download/stable/nvim-win64.zip"
archive_format = "zip"
binary_path = "nvim-win64/bin/nvim.exe"
extract_all = true

[packages.neovim.windows.aarch64]
url = "https://github.com/neovim/neovim/releases/download/stable/nvim-win-arm64.zip"
archive_format = "zip"
binary_path = "nvim-win-arm64/bin/nvim.exe"
extract_all = true

